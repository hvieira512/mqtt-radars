services:
  mysql:
    image: mysql:8.3
    container_name: radar-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: radar
      MYSQL_USER: radar_user
      MYSQL_PASSWORD: radar_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
